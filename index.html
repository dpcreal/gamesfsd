<!DOCTYPE html>
<html>
<head>
    <title>My Game Portal</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        button { padding: 15px 25px; font-size: 18px; cursor: pointer; border-radius: 8px; border: none; background: #007BFF; color: white; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <h1>Click to Play Safely</h1>
    <button onclick="openGame('https://www.example-game.com')">Launch Game</button>

    <script>
        function openGame(url) {
            // 1. Open a new blank window
            var win = window.open('about:blank', '_blank');

            // 2. Style the new window's body to remove margins
            win.document.body.style.margin = '0';
            win.document.body.style.height = '100vh';

            // 3. Create the iframe
            var iframe = win.document.createElement('iframe');
            iframe.style.border = 'none';
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.margin = '0';
            iframe.src = url;

            // 4. Put the iframe into the blank window
            win.document.body.appendChild(iframe);
        }
    </script>

</body>
</html>
