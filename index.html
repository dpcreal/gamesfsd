<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <style>
        body { 
            background: #121212; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        h1 { margin-bottom: 30px; letter-spacing: 2px; }
        input { 
            width: 350px; 
            padding: 15px; 
            border-radius: 8px; 
            border: 2px solid #333; 
            background: #1e1e1e;
            color: white;
            margin-bottom: 20px; 
            font-size: 16px;
            outline: none;
        }
        input:focus { border-color: #28a745; }
        .btn-container { display: flex; gap: 15px; }
        button { 
            padding: 12px 30px; 
            cursor: pointer; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
            font-size: 14px;
            transition: all 0.3s ease; 
        }
        .launch-btn { background: #444; color: white; }
        .game-btn { background: #28a745; color: white; }
        button:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); opacity: 0.9; }
    </style>
</head>
<body>

    <h1>WOODPECKER STEALTH</h1>
    <input type="text" id="urlInput" placeholder="Enter URL (e.g. google.com)">
    
    <div class="btn-container">
        <button class="launch-btn" onclick="launch('custom')">LAUNCH DISGUISE</button>
        <button class="game-btn" onclick="launch('games')">OPEN GAME HUB</button>
    </div>

    <script>
        function launch(mode) {
            let targetUrl = "";
            if (mode === 'games') {
                // Ensure this points to your specific games portal
                targetUrl = "https://dpcreal.github.io/games/";
            } else {
                let input = document.getElementById('urlInput').value;
                if (!input) return alert("Please enter a URL");
                targetUrl = input.startsWith('http') ? input : 'https://' + input;
            }

            const win = window.open('about:blank', '_blank');
            if (win) {
                win.document.write(`
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <title>Google</title>
                        <link rel="icon" href="https://www.google.com/favicon.ico">
                        <script src="https://unpkg.com/@ungap/custom-elements-builtin"><\/script>
                        <script type="module" src="https://unpkg.com/x-frame-bypass"><\/script>
                        <style>
                            body, html { margin: 0; padding: 0; height: 100vh; overflow: hidden; background: #000; }
                            iframe { width: 100%; height: 100%; border: none; }
                        </style>
                    </head>
                    <body>
                        <iframe is="x-frame-bypass" src="${targetUrl}"></iframe>
                    </body>
                    </html>
                `);
                win.document.close();
            } else {
                alert("Pop-up blocked! Please allow pop-ups for this site.");
            }
        }
    </script>
</body>
</html>
