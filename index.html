<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Classes</title> 
    <style>
        body { font-family: sans-serif; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; max-width: 1000px; display: flex; justify-content: flex-start; margin-bottom: 40px; }
        .title { font-size: 24px; font-weight: bold; width: 220px; line-height: 1.2; }
        .search-text { margin-left: 20px; color: gray; }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px; 
            width: 100%; 
            max-width: 1000px; 
        }
        .box { 
            aspect-ratio: 1/1; 
            border: 3px solid black; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-weight: bold;
            transition: 0.2s;
            background: white;
        }
        .box:hover { background: #f0f0f0; transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="header">
        <div class="title">Woodpecker (from dps) game portal</div>
        <div class="search-text">Search bar will be here.</div>
    </div>

    <div class="grid">
        <div class="box" onclick="launch()">GAME 1</div>
        <div class="box" onclick="boxLaunch()">GAME 2</div>
        <div class="box" onclick="boxLaunch()">GAME 3</div>
    </div>

    <script>
        function launch() {
            // 1. Open the blank page
            var win = window.open('about:blank', '_blank');

            // 2. This is the specific website you wanted the portal to lead to
            var finalUrl = "https://dpcreal.github.io/games/";

            // 3. Set up the blank page body
            win.document.body.style.margin = '0';
            win.document.body.style.height = '100vh';
            win.document.body.style.overflow = 'hidden';
            
            // 4. Create and inject the iframe
            var iframe = win.document.createElement('iframe');
            iframe.style.border = 'none';
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.margin = '0';
            iframe.src = finalUrl;

            win.document.body.appendChild(iframe);
        }

        // Shortcut to make all boxes do the same thing for now
        function boxLaunch() {
            launch();
        }
    </script>

</body>
</html>
