<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Tab</title>
</head>
<body style="background: #121212; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif;">

    <h1 style="color: white;">Web Disguise</h1>
    
    <input type="text" id="urlInput" placeholder="https://example.com" style="width: 300px; padding: 10px; margin-bottom: 20px;">
    
    <button onclick="launchDisguise()" style="padding: 10px 20px; cursor: pointer;">Launch Website</button>

    <script>
        function launchDisguise() {
            var url = document.getElementById('urlInput').value;
            
            // Ensure the URL starts with http
            if (!url.startsWith('http')) {
                url = 'https://' + url;
            }

            var win = window.open('about:blank', '_blank');
            var iframe = win.document.createElement('iframe');
            
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.border = 'none';
            iframe.style.margin = '0';
            iframe.src = url;

            win.document.body.style.margin = '0';
            win.document.body.style.height = '100vh';
            win.document.body.appendChild(iframe);
        }
    </script>
</body>
</html>
