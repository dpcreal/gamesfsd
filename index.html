<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Tab</title>
</head>
<body style="background: #121212; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: white;">

    <h1>Woodpecker Stealth</h1>
    
    <input type="text" id="urlInput" placeholder="Enter URL (e.g., example.com)" style="width: 350px; padding: 12px; border-radius: 5px; border: none; margin-bottom: 10px;">
    
    <div style="display: flex; gap: 10px;">
        <button onclick="launch('custom')" style="padding: 10px 20px; cursor: pointer; background: #444; color: white; border: none; border-radius: 5px;">Launch URL</button>
        
        <button onclick="launch('games')" style="padding: 10px 20px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px;">Open Game Hub</button>
    </div>

    <script>
        function launch(mode) {
            var targetUrl = "";

            if (mode === 'games') {
                // Point this to your actual games portal URL
                targetUrl = "https://dpcreal.github.io/games/";
            } else {
                var input = document.getElementById('urlInput').value;
                if (!input) return alert("Please enter a URL");
                
                targetUrl = input.startsWith('http') ? input : 'https://' + input;
            }

            var win = window.open('about:blank', '_blank');
            if (win) {
                win.document.body.style.margin = '0';
                win.document.body.style.height = '100vh';
                
                var iframe = win.document.createElement('iframe');
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                iframe.style.border = 'none';
                iframe.src = targetUrl;

                win.document.body.appendChild(iframe);
            } else {
                alert("Pop-up blocked!");
            }
        }
    </script>
</body>
</html>
